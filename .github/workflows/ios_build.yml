name: iOS Build & Sign

on:
  workflow_dispatch:  # Manuel tetikleme
  push:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.2'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Setup Apple API Key
        run: |
          mkdir -p ~/.private_keys
          echo "${{ secrets.APPLE_API_PRIVATE_KEY }}" > ~/.private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build iOS (no sign)
        run: flutter build ios --release --no-codesign

      - name: Archive & Sign with Apple API Key
        run: |
          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APPLE_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APPLE_API_KEY_ISSUER_ID }} \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }}

      - name: Export IPA (Ad Hoc)
        run: |
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>teamID</key>
              <string>${{ secrets.APPLE_TEAM_ID }}</string>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            -exportPath $RUNNER_TEMP/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APPLE_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APPLE_API_KEY_ISSUER_ID }}

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AcilYardim-iOS
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 7
