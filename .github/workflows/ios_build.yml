name: iOS Build & TestFlight

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'lib/**'
      - 'ios/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.2'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate launcher icons
        run: flutter pub run flutter_launcher_icons

      - name: Install xcodeproj gem
        run: gem install xcodeproj --no-document

      - name: Add Watch App target to Xcode project
        run: ruby ios/add_watch_target.rb

      - name: Setup Apple API Key
        run: |
          mkdir -p ~/.private_keys
          echo "${{ secrets.APPLE_API_PRIVATE_KEY }}" > ~/.private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8

      - name: Revoke old Development certificates
        run: |
          python3 -m pip install pyjwt cryptography -q --break-system-packages
          python3 << 'PYEOF'
          import jwt, time, json, urllib.request, sys

          key_id   = "${{ secrets.APPLE_API_KEY_ID }}"
          issuer   = "${{ secrets.APPLE_API_KEY_ISSUER_ID }}"
          key_path = f"/Users/runner/.private_keys/AuthKey_{key_id}.p8"

          key = open(key_path).read()
          payload = {"iss": issuer, "iat": int(time.time()), "exp": int(time.time()) + 1200, "aud": "appstoreconnect-v1"}
          token = jwt.encode(payload, key, algorithm="ES256", headers={"kid": key_id})

          headers = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}

          # Development sertifikalarını listele
          req = urllib.request.Request(
              "https://api.appstoreconnect.apple.com/v1/certificates?filter[certificateType]=IOS_DEVELOPMENT&limit=20",
              headers=headers
          )
          data = json.loads(urllib.request.urlopen(req).read())
          certs = data.get("data", [])
          print(f"Development sertifika sayısı: {len(certs)}")

          if len(certs) == 0:
              print("Silinecek sertifika yok")
              sys.exit(0)

          # Hepsini sil — build yeni bir tane oluşturacak
          for cert in certs:
              cert_id = cert["id"]
              del_req = urllib.request.Request(
                  f"https://api.appstoreconnect.apple.com/v1/certificates/{cert_id}",
                  method="DELETE", headers=headers
              )
              try:
                  urllib.request.urlopen(del_req)
                  print(f"Silindi: {cert_id}")
              except Exception as e:
                  print(f"Silinemedi {cert_id}: {e}")
          PYEOF

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build iOS (no sign)
        run: flutter build ios --release --no-codesign

      - name: Archive & Sign
        run: |
          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APPLE_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APPLE_API_KEY_ISSUER_ID }} \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            ONLY_ACTIVE_ARCH=NO

      - name: Inject Watch Info.plist if missing
        run: |
          WATCH_APP=$(find "$RUNNER_TEMP/Runner.xcarchive" -name "AcilYardim Watch App.app" 2>/dev/null | head -1)
          if [ -z "$WATCH_APP" ]; then
            echo "[watch_plist] Watch app archive'de bulunamadı, atlanıyor"
            exit 0
          fi
          echo "[watch_plist] Watch app: $WATCH_APP"
          ls "$WATCH_APP/"
          if [ ! -f "$WATCH_APP/Info.plist" ]; then
            echo "[watch_plist] Info.plist EKSİK — kaynaktan kopyalanıyor"
            cp "ios/AcilYardim Watch App/Info.plist" "$WATCH_APP/Info.plist"
            SIGN_ID=$(security find-identity -v -p codesigning | grep -E "iPhone Distribution|Apple Distribution" | head -1 | awk '{print $2}')
            echo "[watch_plist] Yeniden imzalanıyor: $SIGN_ID"
            codesign --force --sign "$SIGN_ID" --preserve-metadata=entitlements,requirements,flags "$WATCH_APP"
            echo "[watch_plist] Tamamlandı"
          else
            echo "[watch_plist] Info.plist zaten mevcut, işlem gerekmez"
          fi

      - name: Export IPA (App Store)
        run: |
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>${{ secrets.APPLE_TEAM_ID }}</string>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>uploadSymbols</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            -exportPath $RUNNER_TEMP/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APPLE_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APPLE_API_KEY_ISSUER_ID }}

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file $(find $RUNNER_TEMP/ipa -name "*.ipa") \
            --apiKey ${{ secrets.APPLE_API_KEY_ID }} \
            --apiIssuer ${{ secrets.APPLE_API_KEY_ISSUER_ID }} \
            --verbose

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AcilYardim-TestFlight
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 7
